      plugins: ["static_layer", "obstacle_layer", "semantic_layer", "sonar_front_layer", "sonar_rear_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_range: 25.0
          obstacle_range: 24.5
          inf_is_valid: True
      semantic_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: semantic_cloud
        semantic_cloud:
          topic: /fusion/obstacle_cloud
          sensor_frame: base_link
          max_obstacle_height: 10.0
          min_obstacle_height: -10.0
          clearing: True
          marking: True
          data_type: "PointCloud2"
          raytrace_range: 5.0
          obstacle_range: 4.5
      sonar_front_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: sonar_front
        sonar_front:
          topic: /sonar_front/scan
          sensor_frame: sonar_front_link
          min_obstacle_height: -0.30
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_range: 5.0
          obstacle_range: 3.5
          inf_is_valid: True
      sonar_rear_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: sonar_rear
        sonar_rear:
          topic: /sonar_rear/scan
          sensor_frame: sonar_rear_link
          min_obstacle_height: -0.30
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_range: 5.0
          obstacle_range: 3.5
          inf_is_valid: True
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.85
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 3.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: true   
      downsampling_factor: 2     
      tolerance: 0.5
      allow_unknown: true
      max_iterations: 400000                      #1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP"   # "DUBIN"   # DUBIN (chỉ tiến) hoặc REEDS_SHEPP (cho phép lùi)
      angle_quantization_bins: 72
      minimum_turning_radius: 0.714       # bán kính xoay của xe = 0.5/tan(0.6109) — đồng bộ với MPPI và SDF joint limit (35°)
      reverse_penalty:  2.1            
      change_penalty: 0.25           
      non_straight_penalty: 1.2       
      cost_penalty: 12.0  
      retrospective_penalty: 0.025
      lookup_table_size: 20.0
      cache_obstacle_heuristic: true

map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: ""


smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["SimpleSmoother"]
    SimpleSmoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

route_server:
  ros__parameters:
    use_sim_time: True
    base_frame: "base_link"
    route_frame: "map"
    path_density: 0.1
    max_iterations: 0
    max_planning_time: 2.0
    smooth_corners: true
    smoothing_radius: 0.5
    
    # Graph Loading
    graph_file_loader: "GeoJsonGraphFileLoader"
    graph_filepath: "/home/tinvo/rover_ackermann/src/ackermann_rover_bringup/maps/route_graph.geojson"
    
    # Plugin Configuration
    edge_cost_functions: ["DistanceScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
      
    # operations: [""]

    
    # Search & Pruning Parameters
    enable_nn_search: true
    max_nn_search_iterations: 10000
    boundary_radius_to_achieve_node: 0.5
    radius_to_achieve_node: 1.0
