behavior_server:
  ros__parameters:
    use_sim_time: True
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["backup", "drive_on_heading", "wait", "ackermann_turnaround"]

    ackermann_turnaround:
      plugin: "ackermann_nav2_behaviors/AckermannTurnAround"
      reverse_speed: 0.2
      forward_speed: 0.2
      angular_vel: 0.28 
      simulate_ahead_time: 2.0

    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.05
      required_movement_angle: 0.05
      movement_time_allowance: 6.0   

    # Goal checker parameters
    general_goal_checker:
      stateful: False
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3  # Tolerance for Ackermann
      yaw_goal_tolerance: 3.14
  
    # MPPI Controller for Ackermann Rover
    # Thông số được tính từ model.sdf:
    #   wheel_base = 0.5m, track_width = 0.6m, wheel_radius = 0.1m
    #   max_steering_angle = 0.6109 rad (~35 deg), min_turning_radius = 0.78m
    #   footprint = 0.6 x 0.5m, mass ~ 22 kg
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      verbose: false                   
      time_steps: 28               
      model_dt: 0.1                  
      batch_size: 200                
      ax_max: 1.0                     
      ax_min: -1.0                    
      ay_max: 0.0               
      az_max: 0.7                  
      vx_max: 0.8                   
      vx_min: -0.5                  
      vy_max: 0.0                   
      wz_max: 0.9                    
      iteration_count: 1              
      temperature: 0.3                 
      gamma: 0.015                     
      motion_model: "Ackermann"        # Mô hình động học Ackermann
      # ---- THÔNG SỐ BẮT BUỘC cho Ackermann model ----
      # min_turning_r = wheel_base / tan(max_steer) = 0.5 / tan(0.6109) = 0.714m
      # Đồng bộ với RA_MAX_STR_ANG = 0.6109 rad (35°) trong PX4 airframe và SDF joint limit
      min_turning_r: 0.714             # Bán kính quay tối thiểu (m) - MPPI dùng để loại quỹ đạo vi phạm Ackermann kinematic
      visualize: false                
      transform_tolerance: 0.5
      prune_distance: 1.5            
      regenerate_noises: false      

      # ---- Ackermann kinematics ----
      critics:
        [
          "ConstraintCritic",
          "ObstaclesCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "PathAlignCritic",
          "PathFollowCritic",
          "PathAngleCritic",
          "PreferForwardCritic",
        ]

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.6   

      GoalAngleCritic:
        enabled: false
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.6  

      PreferForwardCritic:
        enabled: false
        cost_power: 1
        cost_weight: 2.0           

      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 1.5
        critical_weight: 20.0
        consider_footprint: true     
        collision_cost: 1000000.0
        collision_margin_distance: 0.25 
        near_goal_distance: 0.5    

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0            
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3
        threshold_to_consider: 0.8   
        offset_from_furthest: 20
        use_path_orientations: true 

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 0.6

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.6
        max_angle_to_furthest: 1.309   
        mode: 2                       

      # ---- Noise (Gaussian perturbation cho sampling) ----
      # Trục v_x: noise thấp để xe không thay đổi tốc độ đột ngột
      # Trục w_z: noise vừa để thử nghiệm nhiều góc lái
      noise_explicit_params:
        # [vx_noise_std, vy_noise_std, wz_noise_std]
        - 0.5   # TĂNG vx_noise: Đủ lớn để thuật toán "dám" tưởng tượng ra việc đạp thắng và lùi ngay lập tức ở đỉnh cua
        - 0.0    # std vy = 0 (non-holonomic)
        - 0.8    # TĂNG wz_noise mạnh: Để MPPI tạo ra nhiều quỹ đạo đánh lái gắt, dễ dàng tìm thấy đường "lách" qua vật cản


local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      transform_tolerance: 1.0
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[ [0.60, 0.35], [0.60, -0.35], [-0.10, -0.35], [-0.10, 0.35] ]"  
      plugins: ["obstacle_layer", "semantic_layer", "sonar_front_layer", "sonar_rear_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_range: 25.0
          obstacle_range: 24.5
          inf_is_valid: True
      semantic_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: semantic_cloud
        semantic_cloud:
          topic: /fusion/obstacle_cloud
          sensor_frame: base_link
          max_obstacle_height: 10.0
          min_obstacle_height: -10.0
          clearing: True
          marking: True
          data_type: "PointCloud2"
          raytrace_range: 5.0
          obstacle_range: 4.5
      sonar_front_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: sonar_front
        sonar_front:
          topic: /sonar_front/scan
          sensor_frame: sonar_front_link
          min_obstacle_height: -0.30
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_range: 5.0
          obstacle_range: 3.5
          inf_is_valid: True
      sonar_rear_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: sonar_rear
        sonar_rear:
          topic: /sonar_rear/scan
          sensor_frame: sonar_rear_link
          min_obstacle_height: -0.30
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_range: 5.0
          obstacle_range: 3.5
          inf_is_valid: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5 
        inflation_radius: 0.85    
      always_send_full_costmap: True  

